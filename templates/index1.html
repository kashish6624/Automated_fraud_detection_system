<!DOCTYPE html>
<html>
<head>
    <title>Automated Fraud Detection System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: url('static/img.jpeg') no-repeat center center/cover;
            image-rendering: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 30px;
            width: 420px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #2c3e50;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 6px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: #2c3e50;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s ease;
        }

        button:hover {
            background: #1a252f;
            transform: scale(1.03);
        }

        .result-box {
            margin-top: 20px;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            font-weight: bold;
        }

        .safe {
            background-color: #d4edda;
            color: #155724;
        }

        .fraud {
            background-color: #f8d7da;
            color: #721c24;
        }

        .error {
            background-color: #ffeeba;
            color: #856404;
        }

        .confidence {
            font-size: 14px;
            margin-top: 5px;
            font-weight: normal;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Automated Fraud Detection</h2>

    <form method="POST">
        <input type="number" name="step" placeholder="Transaction Hour (Step)" required>

        <select name="type">
            <option value="CASH_IN">Cash In</option>
            <option value="CASH_OUT">Cash Out</option>
            <option value="DEBIT">Debit</option>
            <option value="PAYMENT">Payment</option>
            <option value="TRANSFER">Transfer</option>
        </select>

        <input type="number" step="any" name="amount" placeholder="Transaction Amount" required>
        <input type="number" step="any" name="oldbalanceOrg" placeholder="Old Balance (Sender)" required>
        <input type="number" step="any" name="newbalanceOrig" placeholder="New Balance (Sender)" required>
        <input type="number" step="any" name="oldbalanceDest" placeholder="Old Balance (Receiver)" required>
        <input type="number" step="any" name="newbalanceDest" placeholder="New Balance (Receiver)" required>

        <button type="submit">Analyze Transaction</button>
    </form>

    {% if result %}
        <div class="result-box {{ status_class }}">
            {{ result }}
            {% if probability %}
                <div class="confidence">
                    Model Confidence: {{ probability }}%
                </div>
            {% endif %}
        </div>
    {% endif %}

</div>

</body>
</html>
